name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'

permissions:
  pages: write
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build frontend
        run: |
          mkdir dist
          cp -r frontend/* dist/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4